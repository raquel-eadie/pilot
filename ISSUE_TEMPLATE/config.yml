blank_issues_enabled: false
contact_links:
  - name: DYB Team Norms & Workflow
    url: https://github.com/[your-org]/[your-repo]/wiki
    about: Review team working agreements before creating issues
```

Setting `blank_issues_enabled: false` is worth discussing with the team — it enforces consistency but can feel restrictive for quick tasks.

